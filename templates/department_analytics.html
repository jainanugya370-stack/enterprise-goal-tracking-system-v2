{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg border-0 p-5">

        <h2 class="mb-4">
            Department Analytics
        </h2>

        <table class="table table-hover">

            <thead class="table-dark">

                <tr>

                    <th>Department</th>
                    <th>Employees</th>

                </tr>

            </thead>

            <tbody>

                {% for item in analytics %}

                <tr>

                    <td>
                        {{ item.department.name }}
                    </td>

                    <td>
                        {{ item.employee_count }}
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
