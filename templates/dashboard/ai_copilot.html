{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <!-- HEADER -->

            <div class="card border-0 shadow-lg mb-4">

                <div class="card-body bg-dark text-white rounded">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h2 class="mb-1">
                                🤖 Enterprise AI Copilot
                            </h2>

                            <p class="mb-0">
                                AI-powered HR & Performance Assistant
                            </p>

                        </div>

                        <span class="badge bg-success p-2">
                            LIVE AI
                        </span>

                    </div>

                </div>

            </div>

            <!-- CHAT BOX -->

            <div class="card border-0 shadow-lg">

                <div class="card-body p-4">

                    <!-- QUESTION FORM -->

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <textarea
                                name="question"
                                class="form-control"
                                rows="4"
                                placeholder="Ask AI about performance, goals, productivity, coaching..."
                                required
                            ></textarea>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-dark"
                        >

                            🚀 Ask AI Copilot

                        </button>

                    </form>

                    <!-- AI RESPONSE -->

                    {% if response %}

                        <hr class="my-4">

                        <div class="bg-light rounded p-4">

                            <h5 class="mb-3">
                                🤖 AI Response
                            </h5>

                            <pre style="white-space: pre-wrap;">{{ response }}</pre>

                        </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
