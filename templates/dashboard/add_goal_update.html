{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card-modern">

                <h1 class="page-title">
                    Add Goal Update
                </h1>

                <p class="page-subtitle">
                    Submit progress updates and achievement details.
                </p>

                <div class="mb-4">

                    <h5>
                        Goal
                    </h5>

                    <p class="text-muted">
                        {{ goal.title }}
                    </p>

                </div>

                <form method="POST" class="form-modern">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn-modern"
                    >
                        Save Update
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
