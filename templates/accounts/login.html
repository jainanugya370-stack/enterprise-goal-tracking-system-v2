{% extends 'base.html' %}

{% block auth_content %}

<div class="login-container">

    <div class="login-card">

        <h2 class="login-title">Welcome Back</h2>

        <p class="login-subtitle">Login to GoalSync Portal</p>

        {% if error %}
            <div style="background:#fee2e2; color:#991b1b; padding:12px 16px;
                        border-radius:10px; font-size:13px; margin-bottom:20px;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="form-modern">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                autocomplete="username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                autocomplete="current-password"
                required
            >

            <button type="submit" class="btn-modern w-100">
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
