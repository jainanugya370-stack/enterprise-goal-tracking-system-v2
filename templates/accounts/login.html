{% extends 'base.html' %}

{% block auth_content %}

<div class="login-container">

    <div class="login-card">

        <h2 class="login-title">
            Welcome Back
        </h2>

        <p class="login-subtitle">
            Login to Goal Tracking Portal
        </p>

        <form method="POST" class="form-modern">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button
                type="submit"
                class="btn-modern w-100"
            >
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
